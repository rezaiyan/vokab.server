# Pin Gradle daemon to Java 21.
# Kotlin 1.9.x cannot parse Java versions >= 25 during build script compilation.
# Homebrew: /opt/homebrew/opt/openjdk@21 -> Cellar/openjdk@21/21.0.7
org.gradle.java.home=/opt/homebrew/opt/openjdk@21

# Project version — bump this before tagging a release (e.g. git tag v1.1.0)
projectVersion=1.0.0
