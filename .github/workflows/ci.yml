name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build application
        run: ./gradlew build -x test --stacktrace



  coverage:
    name: Coverage Badge
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests and generate JaCoCo report
        run: ./gradlew test jacocoTestReport

      - name: Update Gist badge
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, json, subprocess, os

          root = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml').getroot()
          c = next(e for e in root.findall('counter') if e.get('type') == 'LINE')
          pct = int(int(c.get('covered')) * 100 / (int(c.get('missed')) + int(c.get('covered'))))
          color = 'brightgreen' if pct >= 80 else ('yellow' if pct >= 70 else 'red')

          badge = json.dumps({"schemaVersion": 1, "label": "coverage", "message": f"{pct}%", "color": color})
          patch = json.dumps({"files": {"lexicon-coverage.json": {"content": badge}}})

          subprocess.run(
              ['gh', 'api', '--method', 'PATCH', f'/gists/{os.environ["GIST_ID"]}', '--input', '-'],
              input=patch, text=True, check=True
          )
          print(f"Coverage badge updated: {pct}% ({color})")
          PYEOF

  openrouter-model-check:
    name: OpenRouter Model Validation
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate OpenRouter model ID
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          MODEL_ID=$(grep -oP "val model: String = \"\K[^\"]*" src/main/kotlin/com/alirezaiyan/vokab/server/service/OpenRouterService.kt)
          echo "Model ID in code: $MODEL_ID"

          if [ -z "$MODEL_ID" ]; then
            echo "::error::Could not extract model ID from OpenRouterService.kt"
            exit 1
          fi

          HTTP_CODE=$(curl -sL -o /tmp/model-response.json -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL_ID\",\"messages\":[{\"role\":\"user\",\"content\":\"Say OK\"}],\"max_tokens\":5}")

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::OpenRouter model '$MODEL_ID' is invalid or unavailable (HTTP $HTTP_CODE)"
            cat /tmp/model-response.json
            exit 1
          fi

          CONTENT=$(cat /tmp/model-response.json | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "::error::Model returned empty response"
            cat /tmp/model-response.json
            exit 1
          fi

          echo "OpenRouter model validation passed: '$MODEL_ID' is valid"

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Dependency Check
        uses: jeremylong/DependencyCheck_Action@main
        with:
          project: 'Lexicon Server'
          path: '.'
          format: 'sarif'
          args: >
            --enableExperimental
            --exclude '.git/**'
            --exclude 'build/**'
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: reports/dependency-check-report.sarif
        if: always()
        continue-on-error: true
