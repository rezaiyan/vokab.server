services:
  # PostgreSQL Database (for production-like testing)
  postgres:
    image: postgres:17-alpine
    container_name: lexicon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexicondb}
      POSTGRES_USER: ${POSTGRES_USER:-lexicon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexicon_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 not exposed to host (app reaches postgres via Docker network).
    # Remove conflict if host PostgreSQL or another service uses 5432.
    networks:
      - lexicon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexicon_user} -d ${POSTGRES_DB:-lexicondb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Lexicon Server Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexicon-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lexicondb}
      DATABASE_USERNAME: ${POSTGRES_USER:-lexicon_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-lexicon_password}
      DATABASE_DRIVER: org.postgresql.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-7776000000}
      JWT_REFRESH_TOKEN_GRACE_PERIOD_MS: ${JWT_REFRESH_TOKEN_GRACE_PERIOD_MS:-30000}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private-key.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public-key.pem}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REVENUECAT_API_KEY: ${REVENUECAT_API_KEY}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8081}
      TEST_EMAILS: ${TEST_EMAILS:-}
      CI_TEST_AUTH_ENABLED: ${CI_TEST_AUTH_ENABLED:-false}
      CI_TEST_SECRET: ${CI_TEST_SECRET:-}
      CI_TEST_EMAIL: ${CI_TEST_EMAIL:-ci-maestro@test.vokab.dev}
      VOCABULARY_SUGGESTION_COUNT: ${VOCABULARY_SUGGESTION_COUNT:-50}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-log}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-Lexicon <noreply@lexicon.app>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      AVATAR_UPLOAD_DIR: ${AVATAR_UPLOAD_DIR:-/var/www/uploads/avatars}
      AVATAR_BASE_URL: ${AVATAR_BASE_URL:-}
      PORT: 8080
    volumes:
      # Persist JWT keys across container restarts
      - jwt_keys:/app/keys
      # Persist avatar uploads
      - avatar_uploads:/var/www/uploads/avatars
    ports:
      - "127.0.0.1:8080:8080"  # Localhost only; use nginx (HTTPS) for external access
    networks:
      - lexicon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Metabase Analytics Dashboard
  metabase:
    image: metabase/metabase:latest
    container_name: lexicon-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - lexicon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres_data:
  jwt_keys:  # Persist JWT RSA keys across container restarts
  avatar_uploads:  # Persist avatar uploads across container restarts
  metabase_data:  # Persist Metabase settings and dashboards

networks:
  lexicon-network:
    driver: bridge
